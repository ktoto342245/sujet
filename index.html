    <button>Разлом «Черной Смерти»

        КВЕСТ-ЛИНИЯ: КАК ДЖАСТ УЗНАЁТ О РАЗЛОМЕ
        Место действия: Деревня Блаттен, таверна «Тихий омут»
        Джаст заходит в таверну. За стойкой — трактирщик Освальд, протирающий кружки.

        Джаст: «Освальд, мне нужна информация. Эрвин сказал, что ты знаешь о разломах больше, чем остальные».
        Освальд: (ставит кружку) «Знаю. И жалею об этом. Садись, Хранитель. Есть одна история… но она не для
        слабонервных».

        Джаст садится за столик. Освальд подходит, садится напротив, понижая голос.

        Освальд: Дня три назад в деревню пришёл торговец из восточных земель.
        Освальд: Звали его… как же… Мартин. Он был не в себе. Глаза красные, руки трясутся.
        Освальд: Рассказывал, что его обоз забрёл в туман, а когда туман рассеялся — они оказались в мёртвом городе».
        Джаст: В каком городе?
        Освальд: (пожимает плечами) Он не знал.
        Освальд: Сказал только, что дома там заколочены крест-накрест, на дверях — странные знаки, а воздух… сладкий.
        Освальд: Как будто кто-то разлил духи над гнилью».

        Освальд оглядывается.

        Освальд: Мартин говорил, что видел там фигуры.
        Освальд: Людей в масках с клювами. Они не двигались. Просто стояли и смотрели.
        Освальд: А потом из-под земли полезли крысы. Тысячи крыс. Он побежал. И единственный выжил.

        Джаст: Где он сейчас?

        Освальд: (вздыхает) В лазарете у Элизы. Слепой.
        Освальд: Всё повторяет: „Маска… заберите маску…“ Элиза говорит, что он умирает.
        Освальд: Никакие травы не помогают. Болезнь пожирает его изнутри.

        Место действия: Лазарет травницы Элизы
        Джаст заходит. Внутри пахнет сушёными травами и… чем-то приторным.
        Мартин лежит на койке, укрытый рваным одеялом. Его лицо бледное, под глазами — чёрные круги.

        Элиза: (наклонившись к Джасту) Он уже не говорит. Только дышит.
        Элиза: Я делаю всё, что могу, но… это не простуда, Хранитель. Это что-то иное, можете подойти.
        Джаст: (после того как он подошел) Мартин. Ты слышишь меня? Где находится этот город? Как мне туда попасть?»

        Мартин открывает глаза. Они мутные, почти белые. Он хватает Джаста за руку с неожиданной силой.

        Мартин: Не ходи туда… Он ждёт. Он всегда ждёт… Крысиный король…

        Мартин закашливается. Изо рта течёт чёрная жидкость.

        Элиза: (оттаскивает Джаста) Отойди! Это заразно!

        Мартин затихает. Глаза закрываются. Грудь перестаёт подниматься.

        Джаст: Он умер?.
        Элиза: (крестится) Да упокоит Господь его душу.
        Элиза: Хранитель… будь осторожен. Этот разлом — не как другие.

        Место действия: Хижина Эрвина
        Джаст возвращается к Эрвину. Старик сидит у камина, перебирая какие-то свитки.

        Эрвин: (не оборачиваясь) Ты был у Освальда. Слышал о Мартине?.
        Джаст: Он умер. У меня на глазах.
        Эрвин: (кивает) Я знал, что это случится.
        Эрвин: Чума, Джаст. Этот разлом — воплощение чумы.
        Джаст: Что мне делать?
        Эрвин: (поднимает свиток) Вот карта. Мартин говорил правду — город существует.

        Эрвин протягивает Джасту свёрток.

        Эрвин: Возьми это. Чеснок, серебряный крест и мешочек с ладаном. Это не спасёт тебя, но даст время.
        И помни: в том разломе не будет живых. Будут только тени. Не доверяй им.
        Джаст: А как закрыть его?
        Эрвин: В центре города, говорят, есть маска. Та, что принадлежала главному лекарю.
        Эрвин: Она держит этот кошмар. Если заберёшь её — разлом закроется.
        Джаст: А если не заберу?
        Эрвин: Тогда ты останешься там. Навсегда. Как и все, кто входил до тебя.

        ПОЛНЫЕ ДИАЛОГИ С ТЕНЯМИ ГОРОЖАН
        Встреча 1: У церкви
        Место: Ступени заброшенной церкви. На них сидит фигура в лохмотьях.

        Тень: (не поднимая головы) Ты новенький? Давно у нас не было гостей.
        Джаст: Я ищу разлом. И того, кто его создал.
        Тень: (поднимает голову — под капюшоном пустота, только два красных огонька вместо глаз)
        Создал? Никто не создавал. Чума пришла сама. А Мортифер просто… стал её голосом.
        Джаст: Кто такой Мортифере? Расскажи мне про него.
        Тень: (качает головой) Был он лекарем. Хорошим. Носил маску с клювом, чтоб не заразиться и лечил нас, когда
        другие сбегали.
        Тень: Мы верили, что он спасёт. А потом…

        Тень замолкает.

        Джаст: Что потом?
        Тень: (голос становится тише) Потом его семья умерла. Жена, дети… всех скосила чума за одну ночь. Он перестал
        лечить. Перестал говорить.
        Тень: Надевал маску и уходил в город на рассвете. А возвращался… другим».
        Джаст: Куда он уходил?
        Тень: (встаёт, начинает таять) Туда, где чума сильнее всего. Он искал её корень. И нашёл. Или чума нашла его…

        Тень рассыпается в прах.

        Джаст: (после осмотра) И куда мне дальше идти?

        Встреча 2: У колодца
        Место: Центральная площадь, старый колодец. Рядом стоит женщина с ведром. Но ведро пустое.

        Тень женщины: (не оборачивается) Ты пришёл закрыть? Поздно. Все уже закрыто.
        Тень женщины: Дома, ставни, гробы… Всё закрыто, кроме рта. Рот всегда открыт.
        Тень женщины: Чтобы дышать этой сладкой смертью».
        Джаст: «Кто здесь главный?»

        Тень женщины: (поворачивается — её лицо скрыто маской) Главный? Тот, кто не умер. Тот, кто стал чумой.
        Тень женщины: Мортифер. Он теперь не человек. Он — стая. Тысячи голосов в одном теле».
        Джаст: «Где мне его найти?»
        Тень женщины: (смеётся) Он сам тебя найдёт. Ты уже вдохнул его воздух.
        Тень женщины: Он уже внутри тебя. Слышишь? Шёпот? Это он».

        Тень женщины бросает ведро в колодец. Оттуда доносится писк тысяч крыс.

        Голос из колодца:
        «Хранитель… иди к нам… иди…»

        Джаст: Нет!

        Тень исчезает. Колодец замолкает.

        Встреча 3: В переулке
        Место: Узкий переулок между домами. В конце стоит фигура ребёнка.

        Тень ребёнка: (голос высокий, но взрослый) Дядя, а ты боишься темноты?

        Джаст: (останавливается)
        «Нет. Я боюсь того, что может случиться с людьми, если я не закрою этот разлом».

        Тень ребенка: (наклоняет голову) А ты знаешь, что чувствует чума? Голод. Она всегда голодна.
        Тень ребенок: Как крысы. Они жрут всё. Дома, людей, даже камни. Потому что им никогда не хватает.
        Джаст: Ты был человеком?
        Тень ребёнка: (подходит ближе — его маска в крови) Был. Но теперь я — голос. Один из многих.
        Тень ребёнка: Мортифер обещал, что мы никогда не умрём. Никогда не будем голодать.
        Тень ребёнка: Он сдержал слово...
        Джаст: Но вы не живёте.
        Тень ребёнка: (замирает) Жить — это… что это? Я не помню. Помню только мамин голос.
        Тень ребёнка: Она звала меня, когда я болел. А потом перестала звать.
        Тень ребёнка: Потому что заболела сама.
        Тень ребёнка: Возьми, это тебе пригодится.(Дает 134 часть дневника)
        Тень тает.

        Встреча 4: У лавки травника
        Место: Разрушенная лавка. Над дверью — вывеска с засохшей травой.

        Тень травника: (сидит на пороге, перебирает сухие листья) Травы не помогают, знаешь. Я пробовал всё.
        Тень травника: Полынь, зверобой, даже корень мандрагоры. Чума смеётся.
        Тень травника: Она не лечится травами. Она лечится… маской».
        Джаст: Что ты знаешь о маске?
        Тень травника: (поднимает голову) Мортифер сделал её сам. Кожа, металл, травы внутри.
        Тень травника: Он думал, что маска защитит. Она и защитила. Но не от чумы.
        Тень травника: От… совести. Он перестал видеть лица умирающих. Видел только клювы».
        Джаст: Где маска сейчас?
        Тень травника: (усмехается) На нём. Всегда на нём. Он не снимает её даже сейчас.
        Тень травника: Говорят, под ней — пустота. Или крысы. Или и то, и другое».

        Тень протягивает Джасту сухой лист.

        Тень травника: Возьми. Это полынь. Поможет тебе не потерять сознание.
        Тень травника: Чума любит, когда ты спишь. Она приходит во сне».

        Джаст берёт лист. Тень исчезает.

        Встреча 5: У фонтана
        Место: Площадь с высохшим фонтаном. Вокруг — кучи тряпья.

        Тень горожанина: (лежит на земле, почти не двигается) Ты… живой? Дай воды…
        Джаст: (протягивает флягу) Держи.

        Тень пытается взять флягу, но рука проходит сквозь неё.

        Тень горожанина: (смеётся) Я забыл… мы не можем пить. Не можем есть.
        Тень горожанина: Только дышать. И вдыхать эту… сладость.

        Джаст: «Как мне победить Мортифера?»

        Тень горожанина: (смотрит на Джаста мутными глазами) Ты не победишь его. Его нельзя убить — он уже мёртв.
        Тень горожанина: Но можно забрать маску. Он держит его в этом мире.
        Тень горожанина: Без неё… он рассыплется, как мы.
        Джаст: А что будет с вами?
        Тень горожанина: (тихо) Мы уже рассыпались. Мы просто помним, каково это — быть живым.
        Тень горожанина: Забери маску. Дай нам забыть».

        Тень закрывает глаза и исчезает.

        ПОСЛЕДНЯЯ ВСТРЕЧА (перед битвой)
        Джаст выходит на центральную площадь. На ступенях ратуши стоит фигура спиной выше всех остальных.
        В длинном плаще, в маске с клювом. Она не двигается.

        Мортифер: (голос спокойный, почти человеческий, стоит спиной) Ты прошёл долгий путь, Хранитель. Слышал мои
        голоса.
        Мортифер: Видел моих детей. Что ты понял?»
        Джаст: Что ты несчастный человек, который стал чудовищем, потому что не мог вынести одиночества.
        Мортифер: (поворачивается, во время этого диалога осматривает руку) Может быть. А может, я стал тем, кем должен
        был стать.
        Мортифер: Единственным, кто помнит этот город.
        Мортифер: Единственным, кто заботится о его жителях.
        Джаст: Ты же убил их всех!
        Мортифер: (делает небольшие шаги в джасту) Я дал им бессмертие. Они никогда не умрут.
        Мортифер: Они всегда будут со мной. В моих крысах. В моём дыхании. В этой сладкой тьме.

        Из-под плаща начинают выползать крысы.

        Мортифер: Ты тоже можешь стать частью этого, Хранитель.
        Мортифер: Просто сними маску страха. Дыши.
        Джаст: Я не хочу дышать твоей смертью. Я закрою этот разлом.
        Мортифер: (смеётся — в смехе слышны сотни голосов) Тогда… начнём.

        БОСС-ФАЙТ

        ФИНАЛЬНЫЙ ДИАЛОГ (после победы)
        Мортифер падает на колени. Крысы разбегаются. Плащ сползает, обнажая скелет.

        Мортифер: (тихо, почти беззвучно) Твои удары — пыль. Твоя магия — прах. Болезнь не лечится мечом.
        Мортифер: И даже если ты убьёшь меня… миллионы крыс уже несут её дальше
        Джаст: (подходит ближе) Ты выбрал бессмертие в крысах и гниющих улицах вместо того, чтобы умереть с
        достоинством.
        Джаст: Я не стану тебя жалеть. Закрою разлом. И твоя чума умрёт вместе с тобой.
        Мортифер: В твоём дыхании. В твоей памяти. Ты унесёшь её с собой… и когда-нибудь она проснётся.

        Он снимает маску. Под ней — ничего. Пустота.

        Джаст: Ты ошибаешься. Я не понесу её. Я закрою этот разлом, и всё, что было внутри, останется здесь.
        Мортифер: (Посмееваясь) Ты прав… разлом закроется. Стены исчезнут.
        Мортифер: Но ты уже дышал этим воздухом. Ты уже видел эти лица. Слышал эти голоса.
        Мортифер: Чума не нуждается в дверях, Хранитель. Она путешествует в памяти.
        Мортифер: Однажды… в самый тёмный час… ты кашлянешь. И вспомнишь меня. И тогда… она проснётся. Не в городе. В
        тебе.
        Джаст: Тогда я встречу её снова. И снова закрою.
        Мортифер: Посмотрим… Хранитель. Посмотрим…

        Он рассыпается в прах. Последние искры его существа уносятся ветром, которого здесь быть не может. Маска падает
        на землю.

        Джаст: (поднимает маску) Я запомню тебя. И твою чуму. Но не дам ей проснуться. Клянусь.

        ДНЕВНИК МОРТИФЕРА (полный текст)

        Найдет он часть на ступенях церкви:
        «День 1. Сегодня началось. Люди кашляют, падают, не встают. Я ставлю маски, молюсь, промываю раны. Ничего не
        помогает».

        Найдет он часть у колодца:
        «День 23. Элис умерла. Моя жена. Я держал её за руку, когда она уходила. Она сказала: "Не бросай их". Я не
        брошу».

        Найдет он часть у Тени горожанки после изчезновения:
        «День 47. Город пустеет. Я ставлю маски на лица мёртвых. Может, это спасёт их души?»

        Найдет он часть после изчерновения травника:
        «День 89. Крысы больше не боятся меня. Они смотрят. Ждут. Я знаю, чего они хотят — тепла, еды, жизни. Я дам им
        это».

        Найдет он часть у тени ребенка:
        «День 134. Я больше не лекарь. Я — чума. И я приму всех, кто готов… принять меня».

        Найдет он часть после смерти Босса Мортифера:
        «День 167. Сегодня ко мне пришёл Хранитель. Он не первый. Но, может быть, последний.
        Он хочет забрать маску. Что ж… пусть попробует».
