<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система заданий</title>
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --bg-item: #2c2c2c;
            --accent-mining: #f39c12;
            --accent-combat: #e74c3c;
            --accent-magic: #9b59b6;
            --text-main: #ecf0f1;
            --text-muted: #95a5a6;
            --reward: #2ecc71;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            color: #fff;
            letter-spacing: 1px;
        }

        .container {
            display: flex;
            gap: 20px;
            flex: 1;
            overflow: hidden; /* Блокируем скролл всей страницы, чтобы скроллились только колонки */
        }

        .column {
            flex: 1;
            background-color: var(--bg-card);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .column h2 {
            text-align: center;
            margin: 0;
            padding: 15px;
            background-color: rgba(255,255,255,0.03);
            border-bottom: 3px solid;
        }

        .col-mining h2 { border-color: var(--accent-mining); color: var(--accent-mining); }
        .col-combat h2 { border-color: var(--accent-combat); color: var(--accent-combat); }
        .col-magic h2 { border-color: var(--accent-magic); color: var(--accent-magic); }

        .quest-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Настройка внешнего вида скроллбара */
        .quest-list::-webkit-scrollbar { width: 8px; }
        .quest-list::-webkit-scrollbar-track { background: var(--bg-card); }
        .quest-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        .quest-list::-webkit-scrollbar-thumb:hover { background: #666; }

        .quest-item {
            background-color: var(--bg-item);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #555;
            transition: transform 0.2s, background-color 0.2s;
        }

        .quest-item:hover {
            transform: translateX(4px);
            background-color: #363636;
        }

        .col-mining .quest-item { border-left-color: var(--accent-mining); }
        .col-combat .quest-item { border-left-color: var(--accent-combat); }
        .col-magic .quest-item { border-left-color: var(--accent-magic); }

        .quest-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .quest-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .quest-reward {
            color: var(--reward);
            font-weight: bold;
        }

        .quest-id {
            color: var(--text-muted);
            font-size: 12px;
        }
    </style>
</head>

        // Функция, которая автоматически переводит Java-код в удобный формат данных
        function parseQuests(rawData) {
            const regex = /new QuestDef\("([^"]+)",\s*"([^"]+)",\s*"([^"]+)",\s*(\d+)\)/g;
            const quests = [];
            let match;
            while ((match = regex.exec(rawData)) !== null) {
                quests.push({
                    title: match[1],
                    reward: match[2],
                    itemId: match[3],
                    count: match[4]
                });
            }
            return quests;
        }

                        <div class="quest-title">${index + 1}. ${q.title}</div>
                        <div class="quest-details">
                            <span class="quest-reward">🎁 ${q.reward}</span>
                            <span class="quest-id">${q.itemId} x${q.count}</span>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
